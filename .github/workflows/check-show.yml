name: Check show

on:
  workflow_dispatch:
    inputs:
      date:
        description: 'Show date (YYYY-MM-DD). Leave empty to check the latest show.'
        required: false
        type: string

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run check-show
        run: |
          if [ -n "${{ inputs.date }}" ]; then
            npm run check-show -- --date "${{ inputs.date }}"
          else
            npm run check-show
          fi
