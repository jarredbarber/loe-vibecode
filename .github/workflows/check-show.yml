name: Show review

on:
  workflow_dispatch:
    inputs:
      date:
        description: 'Show date (YYYY-MM-DD). Leave empty to check the latest show.'
        required: false
        type: string

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install deps
        run: npm ci

      - name: Link / image / audio check
        run: |
          if [ -n "${{ inputs.date }}" ]; then
            npm run check-show -- --date "${{ inputs.date }}"
          else
            npm run check-show
          fi

      - name: Copyedit pass (LLM, advisory)
        # Don't block the run if the LLM step fails — it's advisory.
        if: always()
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -n "${{ inputs.date }}" ]; then
            npm run copyedit-check -- --date "${{ inputs.date }}"
          else
            npm run copyedit-check
          fi
