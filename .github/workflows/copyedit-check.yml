name: Copyedit check

on:
  workflow_dispatch:
    inputs:
      date:
        description: 'Show date (YYYY-MM-DD). Leave empty to check the latest show.'
        required: false
        type: string

jobs:
  copyedit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install deps
        run: npm ci

      - name: Run copyedit-check
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -n "${{ inputs.date }}" ]; then
            npm run copyedit-check -- --date "${{ inputs.date }}"
          else
            npm run copyedit-check
          fi
