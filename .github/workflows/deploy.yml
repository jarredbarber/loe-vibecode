name: Deploy to staging site

on:
  push:
    branches:
      - main  # Change to 'master' if that's your default branch
  workflow_dispatch:  # Allows manual triggering

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; rapid saves from the CMS only
# deploy the latest commit (older in-flight builds get cancelled).
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Build site
        env:
          SITEURL: /
          # GH Pages currently doubles as the staging site. STAGING=true
          # surfaces the /admin/ UI and "Edit on GitHub" buttons. When a
          # separate production deploy (e.g. live branch) is set up later,
          # that workflow should NOT set STAGING.
          STAGING: 'true'
        run: |
          pelican content -s site_config.py
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
