name: Deploy to staging site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            eleventy/package-lock.json

      - name: Install root + eleventy deps
        run: |
          npm ci --no-audit --no-fund
          npm --prefix eleventy ci --no-audit --no-fund

      - name: Build site (Eleventy)
        run: npm --prefix eleventy run build || (cd eleventy && npx @11ty/eleventy)

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: '_site_11ty'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
