name: Refresh recent-window pattern

# eleventy/_data/recentWindow.js computes the CMS date-range regex at build
# time. If a calendar month passes with no commits to main, the regex drifts
# and editors can't see new shows. This workflow pushes an empty commit each
# week to trigger the deploy workflow and regenerate the pattern.

on:
  schedule:
    - cron: '0 5 * * 1'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Push empty commit
        run: |
          git commit --allow-empty -m "chore: refresh recent-window pattern (weekly cron)"
          git push
