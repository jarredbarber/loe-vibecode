name: Refresh recent-window pattern

# eleventy/_data/recentWindow.js computes the CMS date-range regex at build
# time. If a calendar month passes with no commits to main, the regex drifts
# and editors can't see new shows. This workflow dispatches the Deploy
# workflow each week to regenerate the pattern.
#
# Why dispatch instead of an empty commit: commits authored by GITHUB_TOKEN
# don't trigger downstream workflows (GitHub safeguard against infinite
# loops), so push-based triggering never fired the deploy. workflow_dispatch
# via gh CLI works with GITHUB_TOKEN.

on:
  schedule:
    - cron: '0 5 * * 1'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Dispatch deploy workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy.yml --ref main --repo ${{ github.repository }}
