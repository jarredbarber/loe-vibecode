<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Living on Earth — Editor</title>
    <link rel="icon" href="/theme/img/logo.png">
</head>
<body>
    <!-- Sveltia CMS: Decap-compatible config, faster UI. -->
    <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js" type="module"></script>

    <!-- Full-entry preview is Sveltia's built-in markdown renderer +
         the inline toPreview() handlers on each editor component below.
         CMS.registerPreviewTemplate isn't implemented in Sveltia yet
         (planned for 1.0). The Fly.io render service at
         https://loe-vibecode.fly.dev is wired up and ready; see
         issue #4 for the backlog item to consume it from a companion
         preview tab. -->

    <!-- Custom editor components for our {% audio %} and {% cue %} shortcodes.
         Editors get a toolbar button each instead of typing raw shortcode. -->
    <script type="module">
        const wait = setInterval(() => {
            const CMS = window.CMS;
            if (!CMS || typeof CMS.registerEditorComponent !== 'function') return;
            clearInterval(wait);

            // Shared style block matching themes/loe_original/static/css/style.css
            // (.music-cue-item rules) so the editor preview looks like the
            // live render.
            const cardOpen =
                '<div style="' +
                'display:flex;flex-direction:column;gap:8px;' +
                'padding:10px 14px;' +
                'background:rgba(220,237,234,0.4);' +
                'border-radius:4px;' +
                'width:80%;margin:0 auto;box-sizing:border-box;' +
                'font-style:italic;font-family:Arial,Helvetica,sans-serif;font-size:16px;' +
                '">';
            const cardClose = '</div>';

            CMS.registerEditorComponent({
                id: 'audio',
                label: 'Audio player',
                fields: [
                    { name: 'src', label: 'Audio URL (mp3 or Macaulay Library)', widget: 'string' },
                    { name: 'label', label: 'Label (e.g. "Northern Cardinal")', widget: 'string', required: false },
                    { name: 'duration', label: 'Duration / timecode', widget: 'string', required: false },
                ],
                pattern: /^\{%\s+audio\s+src="([^"]+)"(?:\s+label="([^"]*)")?(?:\s+duration="([^"]*)")?\s+%\}$/,
                fromBlock(match) {
                    return { src: match[1], label: match[2] || '', duration: match[3] || '' };
                },
                toBlock(data) {
                    let s = `{% audio src="${data.src}"`;
                    if (data.label) s += ` label="${data.label}"`;
                    if (data.duration) s += ` duration="${data.duration}"`;
                    return s + ' %}';
                },
                toPreview(data) {
                    const esc = (s) => String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/"/g, '&quot;');
                    const meta = (data.label || data.duration)
                        ? `<div>${data.label ? `<div style="font-weight:500;font-size:0.95em;line-height:1.3;">${esc(data.label)}</div>` : ''}${data.duration ? `<div style="font-style:normal;font-size:0.8em;opacity:0.65;margin-top:2px;">${esc(data.duration)}</div>` : ''}</div>`
                        : '';
                    // Native <audio controls> for the preview — the site's custom
                    // .mcp player needs page JS, but native controls give the
                    // editor a working play button that matches the site's
                    // teal-tinted card.
                    const player = data.src
                        ? `<audio controls preload="none" src="${esc(data.src)}" style="width:100%;height:32px;"></audio>`
                        : '<em style="color:#a00;">Missing URL</em>';
                    return cardOpen + meta + player + cardClose;
                },
            });

            CMS.registerEditorComponent({
                id: 'cue',
                label: 'Stage cue / sound effect',
                fields: [
                    { name: 'text', label: 'Cue text (e.g. "CROWD CHEERS" or "BIRDNOTE THEME")', widget: 'string' },
                ],
                pattern: /^\{%\s+cue\s+text="([^"]+)"\s+%\}$/,
                fromBlock(match) {
                    return { text: match[1] };
                },
                toBlock(data) {
                    return `{% cue text="${data.text}" %}`;
                },
                toPreview(data) {
                    const esc = (s) => String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;');
                    const speakerMatch = String(data.text || '').match(/^\s*([A-Z](?:[A-Z'’\d\s.]|[a-z]{1,2}(?=[A-Z]))+):/);
                    let body;
                    if (speakerMatch) {
                        const label = speakerMatch[1];
                        const rest = data.text.slice(speakerMatch[0].length);
                        body = `<p style="margin:0;font-style:italic;"><span style="font-weight:600;font-style:italic;">${esc(label)}:</span>${esc(rest)}</p>`;
                    } else {
                        body = `<p style="margin:0;font-style:italic;">${esc(data.text || '')}</p>`;
                    }
                    return cardOpen + body + cardClose;
                },
            });
        }, 100);
    </script>
</body>
</html>
