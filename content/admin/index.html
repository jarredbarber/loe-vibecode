<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Living on Earth — Editor</title>
    <link rel="icon" href="/theme/img/logo.png">
</head>
<body>
    <!-- Sveltia CMS: Decap-compatible config, faster UI. -->
    <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js" type="module"></script>

    <!-- Configure the preview pane:
         - Load the live site CSS so styling matches.
         - Register a remote preview template that POSTs body+frontmatter to
           the Fly.io preview service and renders the returned HTML. This
           makes the preview pixel-identical to the public site because it
           runs through the SAME Pelican plugin chain.

         To enable: change PREVIEW_URL below to your deployed Fly.io URL.
         Setting it to null disables the remote preview and falls back to
         the local toPreview() handlers in the editor components below
         (still styled close but not pipeline-identical). -->
    <script>
        window.LOE_PREVIEW_URL = null; // e.g. 'https://loe-cms-preview.fly.dev/preview'
    </script>

    <!-- Custom editor components for our {% audio %} and {% cue %} shortcodes.
         Editors get a toolbar button each instead of typing raw shortcode. -->
    <script type="module">
        const wait = setInterval(() => {
            const CMS = window.CMS;
            if (!CMS || typeof CMS.registerEditorComponent !== 'function') return;
            clearInterval(wait);

            // Load the production site CSS into the preview pane so previews
            // look pixel-identical.
            if (typeof CMS.registerPreviewStyle === 'function') {
                CMS.registerPreviewStyle('/theme/css/style.css');
            }

            // Remote preview via the Fly.io render service. Wires up a
            // collection preview template that POSTs the entry to the same
            // Pelican plugin chain that powers the public site, then injects
            // the returned HTML into the preview pane.
            if (window.LOE_PREVIEW_URL && typeof CMS.registerPreviewTemplate === 'function') {
                const h = React.createElement;
                const cache = new Map();

                function RemotePreview({ entry, collection }) {
                    const data = entry.get('data').toJS();
                    const body = data.body || '';
                    const fm = { ...data };
                    delete fm.body;
                    const key = JSON.stringify({ body, fm });

                    const [html, setHtml] = React.useState(cache.get(key) ?? '<p>Rendering…</p>');

                    React.useEffect(() => {
                        if (cache.has(key)) { setHtml(cache.get(key)); return; }
                        let cancelled = false;
                        fetch(window.LOE_PREVIEW_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ body, frontmatter: fm, collection: collection.get('name') }),
                        })
                            .then(r => r.json())
                            .then(j => {
                                if (cancelled) return;
                                const result = j.html || `<p style="color:#a00">Preview error: ${j.error || 'unknown'}</p>`;
                                cache.set(key, result);
                                setHtml(result);
                            })
                            .catch(e => {
                                if (cancelled) return;
                                setHtml(`<p style="color:#a00">Preview unavailable: ${e.message}</p>`);
                            });
                        return () => { cancelled = true; };
                    }, [key]);

                    return h('div', {
                        className: 'single-column',
                        dangerouslySetInnerHTML: { __html: html },
                    });
                }

                for (const name of ['shows', 'segments', 'newsletters', 'pages']) {
                    CMS.registerPreviewTemplate(name, RemotePreview);
                }
            }

            // Shared style block matching themes/loe_original/static/css/style.css
            // (.music-cue-item rules) so the editor preview looks like the
            // live render.
            const cardOpen =
                '<div style="' +
                'display:flex;flex-direction:column;gap:8px;' +
                'padding:10px 14px;' +
                'background:rgba(220,237,234,0.4);' +
                'border-radius:4px;' +
                'width:80%;margin:0 auto;box-sizing:border-box;' +
                'font-style:italic;font-family:Arial,Helvetica,sans-serif;font-size:16px;' +
                '">';
            const cardClose = '</div>';

            CMS.registerEditorComponent({
                id: 'audio',
                label: 'Audio player',
                fields: [
                    { name: 'src', label: 'Audio URL (mp3 or Macaulay Library)', widget: 'string' },
                    { name: 'label', label: 'Label (e.g. "Northern Cardinal")', widget: 'string', required: false },
                    { name: 'duration', label: 'Duration / timecode', widget: 'string', required: false },
                ],
                pattern: /^\{%\s+audio\s+src="([^"]+)"(?:\s+label="([^"]*)")?(?:\s+duration="([^"]*)")?\s+%\}$/,
                fromBlock(match) {
                    return { src: match[1], label: match[2] || '', duration: match[3] || '' };
                },
                toBlock(data) {
                    let s = `{% audio src="${data.src}"`;
                    if (data.label) s += ` label="${data.label}"`;
                    if (data.duration) s += ` duration="${data.duration}"`;
                    return s + ' %}';
                },
                toPreview(data) {
                    const esc = (s) => String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/"/g, '&quot;');
                    const meta = (data.label || data.duration)
                        ? `<div>${data.label ? `<div style="font-weight:500;font-size:0.95em;line-height:1.3;">${esc(data.label)}</div>` : ''}${data.duration ? `<div style="font-style:normal;font-size:0.8em;opacity:0.65;margin-top:2px;">${esc(data.duration)}</div>` : ''}</div>`
                        : '';
                    // Native <audio controls> for the preview — the site's custom
                    // .mcp player needs page JS, but native controls give the
                    // editor a working play button that matches the site's
                    // teal-tinted card.
                    const player = data.src
                        ? `<audio controls preload="none" src="${esc(data.src)}" style="width:100%;height:32px;"></audio>`
                        : '<em style="color:#a00;">Missing URL</em>';
                    return cardOpen + meta + player + cardClose;
                },
            });

            CMS.registerEditorComponent({
                id: 'cue',
                label: 'Stage cue / sound effect',
                fields: [
                    { name: 'text', label: 'Cue text (e.g. "CROWD CHEERS" or "BIRDNOTE THEME")', widget: 'string' },
                ],
                pattern: /^\{%\s+cue\s+text="([^"]+)"\s+%\}$/,
                fromBlock(match) {
                    return { text: match[1] };
                },
                toBlock(data) {
                    return `{% cue text="${data.text}" %}`;
                },
                toPreview(data) {
                    const esc = (s) => String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;');
                    const speakerMatch = String(data.text || '').match(/^\s*([A-Z](?:[A-Z'’\d\s.]|[a-z]{1,2}(?=[A-Z]))+):/);
                    let body;
                    if (speakerMatch) {
                        const label = speakerMatch[1];
                        const rest = data.text.slice(speakerMatch[0].length);
                        body = `<p style="margin:0;font-style:italic;"><span style="font-weight:600;font-style:italic;">${esc(label)}:</span>${esc(rest)}</p>`;
                    } else {
                        body = `<p style="margin:0;font-style:italic;">${esc(data.text || '')}</p>`;
                    }
                    return cardOpen + body + cardClose;
                },
            });
        }, 100);
    </script>
</body>
</html>
