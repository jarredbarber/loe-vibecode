# Tag vocabulary for the Living on Earth auto-tagger.
#
# This is the controlled vocabulary used by `scripts/tag-segments.mjs` to tag
# segments via Gemini. Editors can freely edit this file:
#
#   - Add a tag by appending to a domain group (or create a new group).
#   - Rename a tag by changing the string — note that any segments already
#     tagged with the old name will keep the old tag in their frontmatter
#     until they're re-tagged (run `npm run tag-segments` again, or edit
#     them in the CMS).
#   - Remove a tag by deleting the line. Existing tagged content is not
#     auto-cleaned; the tag will simply stop appearing in the /tags/ index
#     once no segment uses it.
#
# Conventions:
#   - Tags are lowercase, hyphen-separated, no spaces.
#   - Domain group names (the top-level YAML keys) are human-facing — they
#     show up on the /tags.html index page as section headers, so keep them
#     readable.
#   - Tags are flat: a segment's frontmatter just lists the tag strings,
#     never the group. Groups exist for editorial organization only.
#
# After editing this file, run `npm --prefix eleventy run build` to refresh
# tag pages. To re-tag segments against the new vocabulary, run
# `npm run tag-segments -- --limit 50` (or omit --limit for full backfill).

