# Fly.io config for the CMS preview service.
# Deploy from the repo root: `fly deploy --config preview/fly.toml`
# (or `cd preview && fly deploy --dockerfile Dockerfile` — adjust paths).

app = "loe-cms-preview"          # change to your chosen app name
primary_region = "ord"           # closest Fly region; pick whichever

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"    # spin down after idle to stay free
  auto_start_machines = true
  min_machines_running = 0       # zero when idle = $0/mo for low traffic

  [http_service.concurrency]
    type = "requests"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
